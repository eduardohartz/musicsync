services:
  musicsync:
    build: .
    image: musicsync:latest
    container_name: musicsync
    restart: unless-stopped
    init: true
    env_file: .env
    volumes:
      - ./config:/config
    # The one-time OAuth bootstrap needs the callback port published on the
    # host loopback. Run:
    #   docker compose run --rm -p 127.0.0.1:8888:8888 musicsync auth
    # The long-running service itself needs no ports.
