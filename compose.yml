services:
  musicsync:
    build: .
    image: musicsync:latest
    container_name: musicsync
    restart: unless-stopped
    init: true
    env_file: .env
    ports:
      # Web panel (setup wizard, dashboard, OAuth callbacks). Bound to the
      # host loopback — put a reverse proxy in front for remote access.
      - "127.0.0.1:8080:8080"
    volumes:
      # Create ./config before first run (mkdir -p config); on Linux hosts
      # chown it to uid 1000 so the container's non-root user can write it.
      - ./config:/config
